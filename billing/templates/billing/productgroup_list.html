{% extends 'billing/base.html' %}
{% block title %}Product Groups{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Product Groups</h2>
  <div class="d-flex gap-2">
    <a href="{% url 'billing:productgroup_create' %}" class="btn btn-primary">+ New Product Group</a>
    <a href="?{% if export_qs %}{{ export_qs }}&{% endif %}format=pdf" class="btn btn-outline-danger">PDF</a>
    <a href="?{% if export_qs %}{{ export_qs }}&{% endif %}format=excel" class="btn btn-outline-success">Excel</a>
  </div>
</div>
<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>Name</th><th>Active</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.name }}</td>
      <td>{{ item.is_active }}</td>
      <td>
        <a href="{% url 'billing:productgroup_update' item.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'billing:productgroup_delete' item.pk %}" class="btn btn-sm btn-danger">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3" class="text-center">No records.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
